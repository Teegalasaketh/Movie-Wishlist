<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Movie Wishlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
  <style>
    .strength-bar-wrapper{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.strength-bar{
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.1);
    border-radius:50px;
    overflow:hidden;
}

.strength-fill{
    height:100%;
    width:0;
    transition:.3s ease;
    border-radius:50px;
}

.strength-label{
    font-size:.85rem;
    font-weight:600;
}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top py-1">
  <div class="container-fluid px-3">
    <a class="navbar-brand d-flex align-items-center" href="/search">
		    <span class="movie-icon movie-icon--sm me-2" aria-hidden="true">
		      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
		        <title>Movie icon</title>
		        <defs>
		          <linearGradient id="mv-grad" x1="0" x2="1" y1="0" y2="1">
		            <stop offset="0" stop-color="currentColor" stop-opacity="0.95"/>
		            <stop offset="1" stop-color="currentColor" stop-opacity="0.65"/>
		          </linearGradient>
		        </defs>
		        <g stroke="none" fill="none">
		          <rect x="6" y="26" width="52" height="30" rx="3" fill="url(#mv-grad)"/>
		          <rect x="8" y="28" width="48" height="26" rx="2" fill="#fff" opacity="0.06"/>
		          <g transform="translate(6,6)">
		            <rect x="0" y="0" width="52" height="14" rx="2" fill="currentColor"/>
		            <g fill="#fff" opacity="0.12">
		              <rect x="2" y="2" width="10" height="10" transform="skewX(-18)"/>
		              <rect x="16" y="2" width="10" height="10" transform="skewX(-18)"/>
		              <rect x="30" y="2" width="10" height="10" transform="skewX(-18)"/>
		            </g>
		          </g>
		          <g fill="#fff" opacity="0.18">
		            <circle cx="22" cy="42" r="2.4"/>
		            <circle cx="30" cy="42" r="2.4"/>
		            <circle cx="38" cy="42" r="2.4"/>
		          </g>
		          <rect x="6" y="26" width="52" height="30" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.12" stroke-width="1.5"/>
		        </g>
		      </svg>
		    </span>
		    <h1 class="movie-title">Movie Wishlist</h1>
</a>
    <div class="d-flex align-items-center">
      <!-- profile initials button opens modal -->
      <button th:if="${session.userInitials}" type="button" class="profile-circle btn btn-sm me-3" data-bs-toggle="modal" data-bs-target="#profileCardModal" th:title="${session.user != null ? session.user.username : ''}">
        <span th:text="${session.userInitials}">AB</span>
      </button>
      <button id="theme-toggle" class="btn">
        <i class="bi bi-moon-fill"></i>
        <i class="bi bi-sun-fill"></i>
      </button>
    </div>
  </div>
</nav>

<div class="auth-page d-flex align-items-center justify-content-center" style="min-height:80vh;">
  <div class="container-fluid mt-4 px-4">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card auth-card">
          <div class="card-body p-4">
            <h2 class="login-title text-center mb-3">Create your account</h2>
            <form th:action="@{/signup}" th:object="${user}" method="post">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" th:field="*{username}" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
              </div>
              <div class="mb-3">
    <label class="form-label">Password</label>

    <div class="position-relative">
        <input type="password"
               th:field="*{password}"
               class="form-control"
               required
               oninput="updateStrength(this.value)">
    </div>

    <!-- Strength Bar -->
    <div class="strength-bar-wrapper mt-2" id="strengthWrapper" style="display:none">
        <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
        </div>
        <small class="strength-label" id="strengthLabel"></small>
    </div>
</div>
              <div class="text-center">
                <button type="submit" class="btn btn-brand  mt-3">Sign Up</button>
              </div>
            </form>
            <p class="text-center mt-3">Already have an account?
              <a href="/login" class="text-decoration-none">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

  <div th:insert="~{fragments/profile-card :: profileModal}"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/theme.js}"></script>
  <script th:src="@{/js/profile-panel.js}"></script>
  <script>
function updateStrength(val) {
    const wrapper = document.getElementById('strengthWrapper');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    if (!val) {
        wrapper.style.display = 'none';
        return;
    }

    wrapper.style.display = 'flex';

    let score = 0;

    if (val.length >= 8) score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
        { pct: '20%', color: '#e74c3c', text: 'Very Weak' },
        { pct: '40%', color: '#e67e22', text: 'Weak' },
        { pct: '60%', color: '#f1c40f', text: 'Fair' },
        { pct: '80%', color: '#2ecc71', text: 'Strong' },
        { pct: '100%', color: '#27ae60', text: 'Very Strong' }
    ];

    const level = levels[Math.min(score - 1, 4)] || levels[0];

    fill.style.width = level.pct;
    fill.style.background = level.color;
    label.textContent = level.text;
    label.style.color = level.color;
}
</script>
</body>
</html>
