<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password — Movie Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
     <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-header">
        <h1 class="login-title text-center mb-3">Set New Password</h1>
        <p class="auth-subtitle">
            Hi <strong th:text="${username}">User</strong>, choose a strong new password.
        </p>
    </div>

    <form th:action="@{/reset-password}"
          th:object="${resetPasswordRequest}"
          method="post"
          novalidate>

        <!-- Hidden token field -->
        <input type="hidden" th:field="*{token}"/>

        <!-- New Password -->
        <div class="form-group">
            <label for="password" class="form-label">New Password</label>
            <div class="input-wrapper">
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       class="form-input"
                       th:classappend="${#fields.hasErrors('password')} ? 'input-error'"
                       placeholder="At least 8 characters"
                       autocomplete="new-password"
                       oninput="updateStrength(this.value)"
                       autofocus/>
                <button type="button" class="toggle-password" onclick="toggleVisibility('password')" aria-label="Show password">👁</button>
            </div>
            <span th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                  class="field-error"></span>

            <!-- Strength bar -->
            <div class="strength-bar-wrapper" id="strengthWrapper" style="display:none">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-label" id="strengthLabel"></span>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="input-wrapper">
                <input type="password"
                       id="confirmPassword"
                       th:field="*{confirmPassword}"
                       class="form-input"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'input-error'"
                       placeholder="Repeat your password"
                       autocomplete="new-password"
                       oninput="checkMatch()"/>
                <button type="button" class="toggle-password" onclick="toggleVisibility('confirmPassword')" aria-label="Show password">👁</button>
            </div>
            <span th:if="${#fields.hasErrors('confirmPassword')}"
                  th:errors="*{confirmPassword}"
                  class="field-error"></span>
            <span class="field-error" id="matchError" style="display:none">Passwords do not match</span>
            <span class="field-success" id="matchOk" style="display:none">✓ Passwords match</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            Reset Password
        </button>
    </form>

    <div class="auth-footer">
        <a th:href="@{/login}" class="back-link">← Back to Login</a>
    </div>
</div>

<script>
    function toggleVisibility(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function updateStrength(val) {
        const wrapper = document.getElementById('strengthWrapper');
        const fill    = document.getElementById('strengthFill');
        const label   = document.getElementById('strengthLabel');

        if (!val) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'flex';

        let score = 0;
        if (val.length >= 8)  score++;
        if (val.length >= 12) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
            { pct: '20%', color: '#e74c3c', text: 'Very Weak' },
            { pct: '40%', color: '#e67e22', text: 'Weak'      },
            { pct: '60%', color: '#f1c40f', text: 'Fair'      },
            { pct: '80%', color: '#2ecc71', text: 'Strong'    },
            { pct: '100%',color: '#27ae60', text: 'Very Strong'}
        ];
        const level = levels[Math.min(score - 1, 4)] || levels[0];
        fill.style.width = level.pct;
        fill.style.background = level.color;
        label.textContent = level.text;
        label.style.color  = level.color;
    }

    function checkMatch() {
        const pw  = document.getElementById('password').value;
        const cpw = document.getElementById('confirmPassword').value;
        const err = document.getElementById('matchError');
        const ok  = document.getElementById('matchOk');

        if (!cpw) { err.style.display = 'none'; ok.style.display = 'none'; return; }

        if (pw === cpw) {
            err.style.display = 'none';
            ok.style.display  = 'inline';
        } else {
            ok.style.display  = 'none';
            err.style.display = 'inline';
        }
    }
</script>
</body>
</html>
