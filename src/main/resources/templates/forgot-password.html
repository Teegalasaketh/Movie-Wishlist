<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — Movie Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
     <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <!-- Logo / App identity -->
    <div class="auth-header">
        <h1 class="login-title mb-4">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
    </div>

    <!-- Success message (shown after form submit) -->
    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span class="alert-icon">✅</span>
        <span th:text="${successMessage}"></span>
    </div>

    <!-- Forgot Password Form -->
    <form th:unless="${successMessage}"
          th:action="@{/forgot-password}"
          th:object="${forgotPasswordRequest}"
          method="post"
          novalidate>

        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   class="form-input"
                   th:classappend="${#fields.hasErrors('email')} ? 'input-error'"
                   placeholder="you@example.com"
                   autocomplete="email"
                   autofocus/>
            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                  class="field-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
            Send Reset Link
        </button>
    </form>

    <div class="auth-footer">
        <a th:href="@{/login}" class="back-link">← Back to Login</a>
    </div>
</div>

</body>
</html>
