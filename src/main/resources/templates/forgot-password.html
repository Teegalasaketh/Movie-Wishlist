<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — Movie Wishlist</title>

    <!-- Apply saved theme BEFORE first paint — no flash of wrong theme -->
    <script>
        (function () {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">

<div class="auth-card">

    <!-- HEADER — mirrors .modal-header -->
    <div class="auth-header">
        <h1 class="login-title">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
        <div class="auth-avatar">🗝️</div>
    </div>

    <!-- Success message -->
    <div th:if="${successMessage}" class="auth-body">
        <div class="alert alert-success" role="alert">
            <span class="alert-icon">✅</span>
            <span th:text="${successMessage}"></span>
        </div>
    </div>

    <!-- BODY + FOOTER wrapped in form -->
    <form th:unless="${successMessage}"
          th:action="@{/forgot-password}"
          th:object="${forgotPasswordRequest}"
          method="post"
          novalidate>

        <div class="auth-body">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       class="form-input"
                       th:classappend="${#fields.hasErrors('email')} ? 'input-error'"
                       placeholder="you@example.com"
                       autocomplete="email"
                       autofocus/>
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"
                      class="field-error"></span>
            </div>
        </div>

        <!-- FOOTER BUTTONS — mirrors .modal-footer.profile-footer with .btn-brand -->
        <div class="auth-footer-btns">
            <button type="submit" class="btn btn-brand">
                Send Reset Link
            </button>
        </div>

    </form>

    <div class="auth-footer">
        <a th:href="@{/login}" class="back-link">← Back to Login</a>
    </div>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
