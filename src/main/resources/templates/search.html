<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
</head>
<body>

    <nav class="navbar navbar-expand sticky-top py-1">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="/movies">
		    <span class="movie-icon movie-icon--sm me-2" aria-hidden="true">
		      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
		        <title>Movie icon</title>
		        <defs>
		          <linearGradient id="mv-grad" x1="0" x2="1" y1="0" y2="1">
		            <stop offset="0" stop-color="currentColor" stop-opacity="0.95"/>
		            <stop offset="1" stop-color="currentColor" stop-opacity="0.65"/>
		          </linearGradient>
		        </defs>
		        <g stroke="none" fill="none">
		          <rect x="6" y="26" width="52" height="30" rx="3" fill="url(#mv-grad)"/>
		          <rect x="8" y="28" width="48" height="26" rx="2" fill="#fff" opacity="0.06"/>
		          <g transform="translate(6,6)">
		            <rect x="0" y="0" width="52" height="14" rx="2" fill="currentColor"/>
		            <g fill="#fff" opacity="0.12">
		              <rect x="2" y="2" width="10" height="10" transform="skewX(-18)"/>
		              <rect x="16" y="2" width="10" height="10" transform="skewX(-18)"/>
		              <rect x="30" y="2" width="10" height="10" transform="skewX(-18)"/>
		            </g>
		          </g>
		          <g fill="#fff" opacity="0.18">
		            <circle cx="22" cy="42" r="2.4"/>
		            <circle cx="30" cy="42" r="2.4"/>
		            <circle cx="38" cy="42" r="2.4"/>
		          </g>
		          <rect x="6" y="26" width="52" height="30" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.12" stroke-width="1.5"/>
		        </g>
		      </svg>
		    </span>
		    <h1 class="movie-title">Movie Wishlist</h1>
		</a>
                        <div class="d-flex align-items-center flex-nowrap ms-auto gap-2">

                        <a href="/wishlist" class="btn btn-brand me-3">View Wishlist</a>
                        <!-- profile initials button opens modal -->
                        <button th:if="${session.userInitials}" type="button" 
                    class="profile-circle btn btn-sm me-3" 
                    data-open-profile-panel
                    th:title="${session.user != null ? session.user.username : ''}">
              <span th:text="${session.userInitials}">AB</span>
            </button>

            <!-- existing theme toggle -->
            <button id="theme-toggle" class="btn">
                <i class="bi bi-moon-fill"></i>
                <i class="bi bi-sun-fill"></i>
            </button>
        	</div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">
        <header class="hero">
		  <h1 class="animated-heading">Find Your Favorite Movies</h1>
		</header>

        <form action="/search" method="get" class="mb-5">

			<div class="d-flex">

				<div class="position-relative flex-grow-1">

					<input type="text"
						id="movieSearch"
						name="query"
						class="form-control form-control-lg"
						placeholder="Search movies..."
						autocomplete="off"
						th:value="${query}">

				</div>

				<button type="submit" class="btn btn-brand ms-2">
					Search
				</button>

			</div>

		</form>
<div id="homeSections" th:if="${query == null}">
        <section class="movie-section trending-section">
            <div class="section-header">
                <h2 class="animated-heading">🔥 Trending Movies</h2>
            </div>

            <div class="slider-container">
                <button type="button" class="slide-btn slide-btn--left" onclick="slideLeft('trendingRow')">←</button>
                <button type="button" class="slide-btn slide-btn--right" onclick="slideRight('trendingRow')">→</button>
                <div id="trendingRow" class="movie-row">
                    <div th:each="movie : ${trending}">
                        <div class="card movie-card">

                            <div th:if="${movie.poster_path != null}">
                                <div class="poster-container"
                                     th:style="'background-image:url(https://image.tmdb.org/t/p/w500'+${movie.poster_path}+');'">

                                    <img th:src="'https://image.tmdb.org/t/p/w500'+${movie.poster_path}">
                                </div>
                            </div>

                            <div class="card-body">
                                <h6 class="card-title"
                                    th:text="${movie.title}">
                                </h6>

                                <div class="d-flex justify-content-between mb-2">
                                    <span class="wishlist-info"
                                          th:if="${movie['release_date'] != null and #strings.length(movie['release_date']) >= 4}"
                                          th:text="${movie['release_date']}">
                                    </span>

                                    <span class="rating-badge"
                                          th:if="${movie['vote_average'] != null}"
                                          th:text="'⭐ ' + ${movie['vote_average']}">
                                    </span>
                                </div>

                                <p class="movie-overview"
                                   th:text="${movie.overview}">
                                </p>

                                <button type="button" class="btn btn-brand w-100"
                                        th:attr="data-tmdb-id=${movie.id}"
                                        onclick="addToWishlist(this)">
                                   Add to Wishlist
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="movie-section">
            <h2 class="animated-heading">🎬 Upcoming Releases</h2>

            <div class="movie-row">
                <div th:each="movie : ${upcoming}">
                    <div class="card movie-card">

                        <div th:if="${movie.poster_path != null}">
                            <div class="poster-container"
                                 th:style="'background-image:url(https://image.tmdb.org/t/p/w500'+${movie.poster_path}+');'">

                                <img th:src="'https://image.tmdb.org/t/p/w500'+${movie.poster_path}">
                            </div>
                        </div>

                        <div class="card-body">
                            <h6 class="card-title"
                                th:text="${movie.title}">
                            </h6>

                            <div class="d-flex justify-content-between mb-2">
                                <span class="wishlist-info"
                                      th:if="${movie['release_date'] != null and #strings.length(movie['release_date']) >= 4}"
                                     th:text="${movie['release_date']}">
                                </span>

                                <span class="rating-badge"
                                      th:if="${movie['vote_average'] != null}"
                                      th:text="'⭐ ' + ${movie['vote_average']}">
                                </span>
                            </div>

                            <p class="movie-overview"
                               th:text="${movie.overview}">
                            </p>

                            <button type="button" class="btn btn-brand w-100"
                                    th:attr="data-tmdb-id=${movie.id}"
                                    onclick="addToWishlist(this)">
                               Add to Wishlist
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="movie-section">
            <h2 class="animated-heading">🎭 Action Movies</h2>

            <div class="movie-row">
                <div th:each="movie : ${actionMovies}">
                    <div class="card movie-card">

                        <div th:if="${movie.poster_path != null}">
                            <div class="poster-container"
                                 th:style="'background-image:url(https://image.tmdb.org/t/p/w500'+${movie.poster_path}+');'">

                                <img th:src="'https://image.tmdb.org/t/p/w500'+${movie.poster_path}">
                            </div>
                        </div>

                        <div class="card-body">
                            <h6 class="card-title"
                                th:text="${movie.title}">
                            </h6>

                            <div class="d-flex justify-content-between mb-2">
                                <span class="wishlist-info"
                                      th:if="${movie['release_date'] != null and #strings.length(movie['release_date']) >= 4}"
                                     th:text="${movie['release_date']}">
                                </span>

                                <span class="rating-badge"
                                      th:if="${movie['vote_average'] != null}"
                                      th:text="'⭐ ' + ${movie['vote_average']}">
                                </span>
                            </div>

                            <p class="movie-overview"
                               th:text="${movie.overview}">
                            </p>

                            <button type="button" class="btn btn-brand w-100"
                                    th:attr="data-tmdb-id=${movie.id}"
                                    onclick="addToWishlist(this)">
                               Add to Wishlist
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="movie-section">
            <h2 class="animated-heading">🤣Comedy Movies</h2>

            <div class="movie-row">
                <div th:each="movie : ${comedyMovies}">
                    <div class="card movie-card">

                        <div th:if="${movie.poster_path != null}">
                            <div class="poster-container"
                                 th:style="'background-image:url(https://image.tmdb.org/t/p/w500'+${movie.poster_path}+');'">

                                <img th:src="'https://image.tmdb.org/t/p/w500'+${movie.poster_path}">
                            </div>
                        </div>

                        <div class="card-body">
                            <h6 class="card-title"
                                th:text="${movie.title}">
                            </h6>

                            <div class="d-flex justify-content-between mb-2">
                                <span class="wishlist-info"
                                      th:if="${movie['release_date'] != null and #strings.length(movie['release_date']) >= 4}"
                                    th:text="${movie['release_date']}">
                                </span>

                                <span class="rating-badge"
                                      th:if="${movie['vote_average'] != null}"
                                      th:text="'⭐ ' + ${movie['vote_average']}">
                                </span>
                            </div>

                            <p class="movie-overview"
                               th:text="${movie.overview}">
                            </p>

                            <button type="button" class="btn btn-brand w-100"
                                    th:attr="data-tmdb-id=${movie.id}"
                                    onclick="addToWishlist(this)">
                               Add to Wishlist
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="movie-section">
            <h2 class="animated-heading">🚀 Sci-Fi Movies</h2>

            <div class="movie-row">
                <div th:each="movie : ${scifiMovies}">
                    <div class="card movie-card">

                        <div th:if="${movie.poster_path != null}">
                            <div class="poster-container"
                                 th:style="'background-image:url(https://image.tmdb.org/t/p/w500'+${movie.poster_path}+');'">

                                <img th:src="'https://image.tmdb.org/t/p/w500'+${movie.poster_path}">
                            </div>
                        </div>

                        <div class="card-body">
                            <h6 class="card-title"
                                th:text="${movie.title}">
                            </h6>

                            <div class="d-flex justify-content-between mb-2">
                                <span class="wishlist-info"
                                      th:if="${movie['release_date'] != null and #strings.length(movie['release_date']) >= 4}"
                                      th:text="${movie['release_date']} + ' 😂'">
                                </span>

                                <span class="rating-badge"
                                      th:if="${movie['vote_average'] != null}"
                                      th:text="'⭐ ' + ${movie['vote_average']}">
                                </span>
                            </div>

                            <p class="movie-overview"
                               th:text="${movie.overview}">
                            </p>

                            <button type="button" class="btn btn-brand w-100"
                                    th:attr="data-tmdb-id=${movie.id}"
                                    onclick="addToWishlist(this)">
                               Add to Wishlist
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
        <p th:if="${errorMessage}" class="text-danger text-center" th:text="${errorMessage}"></p>

        <div id="movieResults"
     class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col" th:each="movie : ${results}">
                 <div class="card movie-card h-100">

                    <div th:if="${movie.poster_path != null}">
					    <div class="poster-container" th:style="'background-image: url(https://image.tmdb.org/t/p/w500' + ${movie.poster_path} + ');'">
					        <img th:src="'https://image.tmdb.org/t/p/w500' + ${movie.poster_path}" th:alt="${movie.title}">
					    </div>
					</div>
					<div th:unless="${movie.poster_path != null}">
					    <div class="img-not-found" role="img" aria-label="Image not found">Img Not Found</div>
					</div>
                    <div class="card-body">
                        <div>
                            <h5 class="card-title" th:text="${movie.title}">Movie Title</h5>
                            <p class="card-text text-muted" th:if="${movie.release_date != null and !#strings.isEmpty(movie.release_date)}" th:text="'Release: ' + ${movie.release_date} + ' 😂'"></p>
                        </div>
                        <button type="button" class="btn btn-brand w-100 mt-3" 
						        th:attr="data-tmdb-id=${movie.id}" 
						        onclick="addToWishlist(this)">
						    Add to Wishlist
						</button>
                    </div>
					
                </div>
            </div>
        </div>
    </div>
	<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
	  <div id="toastMsg" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
	    <div class="d-flex">
	      <div class="toast-body">
	        Added to List 🎬
	      </div>
	      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
	    </div>
	  </div>
	</div>

    <div th:insert="~{fragments/profile-card :: profileModal}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/theme.js}"></script>
	<script>
	async function addToWishlist(button) {
		const tmdbId = button.getAttribute("data-tmdb-id");

		try {
			const res = await fetch(`/add?tmdbId=${tmdbId}`);
			const text = await res.text();   // <-- read response text ("added", "exists", "error")

			const toastEl = document.getElementById('toastMsg');
			const toastBody = toastEl.querySelector('.toast-body');

			if (text === "added") {
				toastBody.innerText = "Added to Wishlist 🎬";
			} 
			else if (text === "exists") {
				toastBody.innerText = "Already in Wishlist!!";
			} 
			else {
				toastBody.innerText = "Something went wrong ❌";
			}

			const toast = new bootstrap.Toast(toastEl);
			toast.show();
			setTimeout(() => toast.hide(), 3000);

		} catch (err) {
			console.error('Fetch error:', err);
			alert('Server not reachable.');
		}

		// Sound effect (optional)
		const addSound = document.getElementById('sound-add');
		if (addSound) {
			addSound.currentTime = 0;
			addSound.play().catch(() => {});
		}
	}
	function slideLeft(id){
		document.getElementById(id)
			.scrollBy({
				left:-800,
				behavior:'smooth'
			});
	}

	function slideRight(id){
		document.getElementById(id)
			.scrollBy({
				left:800,
				behavior:'smooth'
			});
	}

	const input = document.getElementById("movieSearch");
	const resultsContainer = document.getElementById("movieResults");
	const homeSections = document.getElementById("homeSections");

	let timeout;

	input.addEventListener("input", () => {

		clearTimeout(timeout);

		const query = input.value.trim();

		if(query.length < 2){
			resultsContainer.innerHTML = "";

			if(homeSections){
				homeSections.style.display = "block";
			}

			return;
		}

		timeout = setTimeout(async () => {
			if(homeSections){
				homeSections.style.display = "none";
			}
			const response = await fetch(
				`/live-search?query=${encodeURIComponent(query)}`
			);

			const movies = await response.json();

			resultsContainer.innerHTML = "";

			movies.forEach(movie => {

				const poster = movie.poster_path
					? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
					: "";

				resultsContainer.innerHTML += `
					<div class="col">
						<div class="card movie-card h-100">

							${
								movie.poster_path
								?
								`<div class="poster-container"
									style="background-image:url('${poster}')">
									<img src="${poster}">
								</div>`
								:
								`<div class="img-not-found">
									Img Not Found
								</div>`
							}

							<div class="card-body">

								<h5 class="card-title">
									${movie.title}
								</h5>

								<p class="card-text text-muted">
									Release:
									${movie.release_date || "N/A"}
								</p>

								<button
									type="button"
									class="btn btn-brand w-100 mt-3"
									data-tmdb-id="${movie.id}"
									onclick="addToWishlist(this)">
									Add to Wishlist
								</button>

							</div>
						</div>
					</div>
				`;
			});

		}, 300);
	});
	</script>
    <script th:src="@{/js/profile-panel.js}"></script>
<audio id="sound-add" src="/sounds/notify.mp3" preload="auto"></audio>
</body>
</html>
