<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Password Reset Successful — Movie Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">

<div class="auth-card result-card">
    <h1 class="login-title text-center mb-3">Password Reset!</h1>
    <p class="movie-overview">
        Your password has been updated successfully.<br/>
        You can now log in with your new password.
    </p>
    <a th:href="@{/login}" class="btn btn-primary btn-full" style="margin-top: 1.5rem;">
        Go to Login
    </a>
</div>

</body>
</html>
