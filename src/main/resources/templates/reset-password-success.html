<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Password Reset Successful — Movie Wishlist</title>

    <!-- Apply saved theme BEFORE first paint — no flash of wrong theme -->
    <script>
        (function () {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">

<div class="auth-card result-card">

    <div class="auth-body">
        <div class="result-icon success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h1 class="login-title" style="text-align:center; margin-bottom:14px;">
            Password Reset!
        </h1>
        <p class="movie-overview">
            Your password has been updated successfully.<br/>
            You can now log in with your new password.
        </p>
    </div>

    <div class="auth-footer-btns">
        <a th:href="@{/login}" class="btn btn-brand">
            Go to Login
        </a>
    </div>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
