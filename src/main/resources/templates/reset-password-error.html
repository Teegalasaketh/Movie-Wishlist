<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Invalid Reset Link — Movie Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/profile-panel.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">

<div class="auth-card result-card">
    <div class="result-icon error-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <h1 class="login-title text-center mb-3">Link Expired or Invalid</h1>
    <p class="movie-overview">
        This password reset link is no longer valid.<br/>
        It may have already been used or expired (links are valid for 1 hour).
    </p>
    <a th:href="@{/forgot-password}" class="btn btn-primary btn-full" style="margin-top: 1.5rem;">
        Request a New Link
    </a>
    <div class="auth-footer">
        <a th:href="@{/login}" class="back-link">← Back to Login</a>
    </div>
</div>

</body>
</html>
