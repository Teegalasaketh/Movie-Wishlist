<div th:fragment="profileCard">
  <div class="container my-3">
    <!-- Profile Panel Trigger (for navbar integration) -->
    <div th:if="${session.user}" style="display: none;">
      <button id="profilePanelTrigger" class="btn btn-sm" style="display: none;">
        <span th:text="${session.userInitials}">AB</span>
      </button>
    </div>
  </div>
</div>

<!-- Modal Fragment - Now includes modern profile panel + redesigned modals -->
<div th:fragment="profileModal">
  
  <!-- PROFILE PANEL OVERLAY -->
  <div id="profilePanelOverlay" class="profile-panel-overlay"></div>

  <!-- MODERN PROFILE MANAGEMENT PANEL -->
  <div id="profilePanelCard" class="profile-panel-card">
    <div class="profile-panel">
      <div class="profile-panel-header">
        <button type="button" class="profile-panel-close" id="profilePanelClose" aria-label="Close">×</button>
        
        <div th:if="${session.user}">
          <div class="profile-avatar"
     th:text="${session.userInitials}">
    AB
</div>
          <h3 class="profile-panel-username" th:text="${session.user != null ? session.user.username : 'Guest'}">Username</h3>
          <p class="profile-panel-email" th:text="${session.user != null ? session.user.email : ''}">email@example.com</p>
        </div>
        
        <div th:unless="${session.user}" style="text-align: center;">
          <p style="margin-bottom: 16px;">Not signed in</p>
          <a href="/login" class="profile-btn profile-btn-primary" style="margin-bottom: 8px;">Login</a>
          <a href="/signup" class="profile-btn profile-btn-secondary">Sign Up</a>
        </div>
      </div>

      <div class="profile-panel-actions" th:if="${session.user}">
        <button type="button" class="btn btn-brand me-3" data-bs-toggle="modal" data-bs-target="#editProfileModal" id="editProfileBtnPanel">
          Edit Profile
        </button>
        <button type="button" class="btn btn-brand me-3" data-bs-toggle="modal" data-bs-target="#changePasswordModal" id="changePasswordBtnPanel">
          Change Password
        </button>
        <a href="/logout" class="btn btn-brand me-3">
          Logout
        </a>
      </div>
    </div>
  </div>

  <!-- EDIT PROFILE MODAL -->
<div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
        <form th:action="@{/profile/update}" method="post">
            <input type="hidden" name="returnUrl" id="editReturnUrl">
            <div class="modal-header position-relative">

                <h5 class="login-title text-center mb-3">Edit Profile</h5>

                <!-- Profile Avatar -->
                <div class="profile-avatar modal-avatar"
                     th:text="${session.userInitials}">
                    S
                </div>

            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input name="username"
                           class="form-control"
                           th:value="${session.user != null ? session.user.username : ''}" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input name="email"
                           type="email"
                           class="form-control"
                           th:value="${session.user != null ? session.user.email : ''}" />
                </div>

            </div>

            <div class="modal-footer profile-footer">
                <button type="button"
                        class="btn btn profile-btn "
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button type="submit"
                        class="btn profile-btn">
                    Save Changes
                </button>
            </div>

        </form>

    </div>
</div>

</div>


  <!-- CHANGE PASSWORD MODAL -->
  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form th:action="@{/profile/change-password}" method="post">
          <input type="hidden" name="returnUrl" id="passwordReturnUrl">
          <div class="modal-header">
            <h5 class="login-title text-center mb-3">Change Password</h5>
            <div class="profile-avatar modal-avatar" th:text="${session.userInitials}"> AB </div>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <div class="input-group">
                <input name="currentPassword" type="password" class="form-control" placeholder="Enter your current password" />
                <button type="button" class="password-toggle" tabindex="-1" onclick="togglePasswordVisibility(event)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input name="newPassword" type="password" class="form-control" placeholder="Enter your new password" />
                <button type="button" class="password-toggle" tabindex="-1" onclick="togglePasswordVisibility(event)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <div class="input-group">
                <input name="confirmPassword" type="password" class="form-control" placeholder="Confirm your new password" />
                <button type="button" class="password-toggle" tabindex="-1" onclick="togglePasswordVisibility(event)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="modal-footer profile-footer">
            <button type="button" class="btn profile-btn" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn profile-btn">Update Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
