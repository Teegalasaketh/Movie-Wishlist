<div th:fragment="profileCard">
  <div class="container my-3">
    <div th:if="${session.user}" class="card profile-card p-0" style="max-width:360px;">
            <div class="card-body">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
                        <span th:text="${session.userInitials}">AB</span>
                    </div>
                    <div>
                        <h6 class="mb-0" th:text="${session.user != null ? session.user.username : 'Guest'}">Username</h6>
                        <small class="text-muted" th:text="${session.user != null ? session.user.email : ''}">email@example.com</small>
                    </div>
                </div>

                <div class="mt-3 d-grid gap-2">
                  <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal">Edit Profile</button>
                  <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#changePasswordModal">Change Password</button>
                </div>
            </div>
        </div>

        <div th:unless="${session.user}">
            <div class="card profile-card" style="max-width:360px;">
                <div class="card-body text-center">
                    <p class="mb-2">Not signed in</p>
                    <a href="/login" class="btn btn-brand me-2">Login</a>
                    <a href="/signup" class="btn btn-light">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Modal fragment to show profile when clicking the navbar initials -->
<div th:fragment="profileModal">
  <div class="modal fade" id="profileCardModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content card movie-card" style="max-width:360px; margin:auto;">
        <div class="modal-body p-3" style="background-color:var(--card-bg);">
          <div th:if="${session.user}" class="d-flex align-items-center gap-3">
            <div class="avatar bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
              <span th:text="${session.userInitials}">AB</span>
            </div>
            <div>
              <h6 class="mb-0" th:text="${session.user != null ? session.user.username : 'Guest'}">Username</h6>
              <small class="text-muted" th:text="${session.user != null ? session.user.email : ''}">email@example.com</small>
            </div>
          </div>
          <div th:unless="${session.user}" class="text-center">
            <p class="mb-2">Not signed in</p>
            <a href="/login" class="btn btn-brand me-2">Login</a>
          </div>

          <div class="mt-3 d-grid gap-2">
            <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal" data-bs-dismiss="modal">Edit Profile</button>
            <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#changePasswordModal" data-bs-dismiss="modal">Change Password</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Edit Profile Modal -->
  <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form th:action="@{/profile/update}" method="post" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">User name</label>
            <input name="username" class="form-control" th:value="${session.user != null ? session.user.username : ''}" />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" th:value="${session.user != null ? session.user.email : ''}" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-brand">Save changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form th:action="@{/profile/change-password}" method="post" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Change Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Current password</label>
            <input name="currentPassword" type="password" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">New password</label>
            <input name="newPassword" type="password" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input name="confirmPassword" type="password" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-brand">Change password</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Forgot Password Modal (used on login page) -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form th:action="@{/forgot-password}" method="post" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Forgot Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" placeholder="your@email.com" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-brand">Send reset link</button>
        </div>
      </form>
    </div>
  </div>
</div>
